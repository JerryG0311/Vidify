<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Keep only static CSS here to prevent VS Code errors */
        body { margin: 0; padding: 0; background: #000; }
        
        .player-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .is-embed-container { max-width: 100%; margin: 0; padding: 0; }

        .video-stage { 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            aspect-ratio: 16 / 9;
            padding: 20px; 
        }
        .is-embed-stage { border-radius: 0; box-shadow: none; padding: 0; }
        
        video { width: 100%; height: 100%; display: block; border-radius: 4px; }
        .is-embed-video { border-radius: 0; }
        
        .video-info { margin-top: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .video-title { font-size: 24px; font-weight: bold; margin: 0; color: #1a202c; }
        .meta-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; color: #718096; font-size: 0.9em; }
        .stats { display: flex; gap: 20px; }
        .stats b { color: #2d3748; }
        .description-box { margin-top: 20px; line-height: 1.6; color: #4a5568; background: #f8fafc; padding: 20px; border-radius: 8px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; text-align: center; }
        .tab-btn { background: none; border: none; cursor: pointer; font-weight: bold; padding: 10px 15px; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #00adef; border-bottom: 2px solid #00adef; }
        .tab-btn.inactive { color: #718096; }
    </style>
</head>
<body>
    <div class="player-container {{if .IsEmbed}}is-embed-container{{end}}">
        {{if not .IsEmbed}}
        <a href="/gallery" style="text-decoration: none; color: #00adef; font-weight: bold; font-size: 0.9em;">Back to Library</a>
        {{end}}
        
        <div class="video-stage {{if .IsEmbed}}is-embed-stage{{end}}">
            <video controls {{if .IsEmbed}}autoplay{{end}} poster="{{.Video.ThumbnailURL}}" class="{{if .IsEmbed}}is-embed-video{{end}}">
                <source src="{{.Video.SourcePath}}" type="video/mp4">
            </video>
        </div>

        {{if not .IsEmbed}}
        <div class="video-info">
            <h1 class="video-title">{{.Video.Title}}</h1>
            <div class="meta-bar">
                <div class="stats">
                    <span>Views: <b>{{.Video.Views}}</b></span>
                    <span>Uploaded: <b>{{.Video.CreatedAt.Format "Jan 02, 2006"}}</b></span>
                </div>
                <div class="action-buttons">
                    <button class="btn" style="background:#4a5568;" onclick="openShareModal('{{.Video.Title}}')">Share</button>
                    <a href="{{.Video.SourcePath}}" download class="btn" style="background:#2c7a7b;">Download</a>
                </div>
            </div>
        </div>

        {{if .Video.Description}}
        <div class="description-box">
            <h3 style="margin-top:0; font-size: 0.9em; color: #718096; text-transform: uppercase; letter-spacing: 1px;">Description</h3>
            {{.Video.Description}}
        </div>
        {{end}}
        {{end}}
    </div>

    <div id="shareModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top:0; font-size: 1.2em;">Share Video</h2>
            <div style="display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 1px solid #eee;">
                <button onclick="switchTab('link')" id="linkTabBtn" class="tab-btn active">Direct Link</button>
                <button onclick="switchTab('embed')" id="embedTabBtn" class="tab-btn inactive">Embed Code</button>
            </div>
            <div id="linkSection">
                <div style="margin-bottom: 20px; display: flex; gap: 10px; justify-content: center;">
                    <a id="shareX" target="_blank" class="btn" style="background:#000;">X / Twitter</a>
                    <a id="shareLI" target="_blank" class="btn" style="background:#0077b5;">LinkedIn</a>
                </div>
                <input type="text" id="shareUrlInput" readonly style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; text-align: center;">
            </div>
            <div id="embedSection" style="display:none;">
                <textarea id="embedCodeInput" readonly style="width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: monospace; font-size: 0.85em; resize: none;"></textarea>
            </div>
            <div style="margin-top: 25px; display: flex; gap: 10px;">
                <button id="copyBtn" onclick="copyToClipboard()" class="btn" style="flex:2; background: #00adef;">Copy to Clipboard</button>
                <button onclick="closeModal()" class="btn" style="flex:1; background: #eee; color: #333;">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'link';
        function openShareModal(title) {
            const url = window.location.href.split('?')[0];
            const embedUrl = `${url}?embed=true`;
            const embedCode = `<iframe src="${embedUrl}" width="640" height="360" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('shareModal').style.display = 'flex';
            document.getElementById('shareUrlInput').value = url;
            document.getElementById('embedCodeInput').value = embedCode;
            document.getElementById('shareX').href = `https://twitter.com/intent/tweet?text=Check out ${title}&url=${url}`;
            document.getElementById('shareLI').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
        }
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('linkSection').style.display = tab === 'link' ? 'block' : 'none';
            document.getElementById('embedSection').style.display = tab === 'embed' ? 'block' : 'none';
            document.getElementById('linkTabBtn').className = tab === 'link' ? 'tab-btn active' : 'tab-btn inactive';
            document.getElementById('embedTabBtn').className = tab === 'embed' ? 'tab-btn active' : 'tab-btn inactive';
        }
        function copyToClipboard() {
            const inputId = currentTab === 'link' ? 'shareUrlInput' : 'embedCodeInput';
            const copyText = document.getElementById(inputId);
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = "Copy to Clipboard"; }, 2000);
        }
        function closeModal() { document.getElementById('shareModal').style.display = 'none'; }
    </script>
</body>
</html>
