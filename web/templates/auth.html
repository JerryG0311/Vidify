<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vidify - {{.Type}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background: #0f0f0f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; color: #ffffff; padding: 24px; box-sizing: border-box; }
        .auth-card { background: #181818; padding: 40px; border-radius: 16px; box-shadow: 0 18px 40px rgba(0,0,0,0.30); width: 100%; max-width: 380px; text-align: center; border: 1px solid #282828; }
        h2 { text-transform: capitalize; margin-bottom: 10px; color: #ffffff; font-size: 30px; }
        .auth-subtitle { margin: 0 0 28px; color: #9ca3af; font-size: 14px; line-height: 1.5; }
        input { width: 100%; padding: 14px 16px; margin-bottom: 15px; border: 1px solid #282828; border-radius: 8px; box-sizing: border-box; outline: none; background: #101010; color: #ffffff; font-size: 15px; }
        input:focus { border-color: #00adef; box-shadow: 0 0 0 3px rgba(0, 173, 239, 0.12); }
        input::placeholder { color: #6b7280; }
        .btn-auth { width: 100%; background: #00adef; color: white; border: none; padding: 13px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-auth:hover { background: #0081b3; }
        .switch { margin-top: 22px; font-size: 0.95em; color: #9ca3af; }
        .switch a { color: #00adef; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>{{.Type}}</h2>
        <p class="auth-subtitle">
            {{if eq .Type "login"}}
                Log in to access your videos, profile, and creator dashboard.
            {{else}}
                Create your Vidify account and start building your creator profile.
            {{end}}
        </p>
        <form action="/{{.Type}}" method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-auth">{{if eq .Type "login"}}Log In{{else}}Create Account{{end}}</button>
        </form>
        <div class="switch">
            {{if eq .Type "login"}}
                Don't have an account? <a href="/signup">Sign Up</a>
            {{else}}
                Already have an account? <a href="/login">Log In</a>
            {{end}}
        </div>
    </div>
</body>
</html>
